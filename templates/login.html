<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f5f5, #e0e0e0);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        /* Banner superior */
        .banner {
            width: 100%;
            background: #007BFF;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }
        /* Contenedor principal centrado */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;   /* Centra horizontal */
            align-items: center;       /* Centra vertical */
        }
        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.25);
            width: 320px;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007BFF;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #0056b3;
        }
        /* Adaptación para móviles */
        @media (max-width: 480px) {
            .login-container {
                width: 90%;
                padding: 30px;
            }
            .banner {
                font-size: 22px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- Banner superior -->
    <div class="banner">El Chavalo Nica</div>

    <!-- Contenedor principal -->
    <div class="main">
        <div class="login-container">
            <h2>Ingreso al sistema</h2>
            <form action="/login" method="post">
                <input type="text" name="usuario" placeholder="Usuario" required>
                <input type="password" name="contraseña" placeholder="Contraseña" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
